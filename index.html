<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2e5d18">
  <title>Alpha Snake</title>
  <style>
    :root {
      --bg: #2e5d18;
      --bg-deep: #183812;
      --leaf: #6CCB3C;
      --leaf-bright: #8DE84A;
      --leaf-mid: #4E962C;
      --leaf-dark: #2E5D18;
      --accent-blue: #4B7BFF;
      --accent-blue-deep: #2E5EFF;
      --gold: #FFD95A;
      --danger: #FF5B6E;
      --glass: rgba(20, 30, 20, 0.45);
      --glass-strong: rgba(20, 30, 20, 0.68);
      --tile-a: #a8d94d;
      --tile-b: #a0d248;
      --text: #f6ffe7;
      --muted: rgba(246, 255, 231, 0.72);
      --font: "Inter", "Poppins", "SF Pro Display", "Segoe UI", sans-serif;
      --shadow-soft: 0 20px 45px rgba(8, 26, 8, 0.28);
      --shadow-deep: 0 32px 90px rgba(8, 22, 7, 0.45);
      --radius-xl: 36px;
      --radius-lg: 26px;
      --radius-md: 20px;
      --viewport-pad: 12px;
      --shell-max: 1120px;
      --rail-width: 340px;
      --stage-max: 640px;
      --stage-side-reserve: 520px;
      --answer-detail-max-h: min(300px, 40vh);
    }
    html[data-device="tablet"] {
      --viewport-pad: 10px;
      --shell-max: 1024px;
      --rail-width: 320px;
      --stage-max: 580px;
      --stage-side-reserve: 220px;
      --answer-detail-max-h: min(290px, 38vh);
    }
    html[data-device="phone"] {
      --viewport-pad: 8px;
      --shell-max: 100%;
      --rail-width: 100%;
      --stage-max: min(calc(100vw - 40px), 520px);
      --stage-side-reserve: 20px;
      --answer-detail-max-h: min(280px, 38vh);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(141, 232, 74, 0.16), transparent 24%),
        radial-gradient(circle at 85% 18%, rgba(75, 123, 255, 0.12), transparent 22%),
        radial-gradient(circle at 50% 110%, rgba(255, 217, 90, 0.08), transparent 30%),
        linear-gradient(180deg, #5d9f31 0%, #4c8a28 35%, #33661b 100%);
    }
    body {
      position: relative;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--viewport-pad);
      background-attachment: fixed;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.8;
    }
    body::before {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12), transparent 22%),
        radial-gradient(circle at 70% 35%, rgba(141,232,74,0.12), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05), transparent 28%);
      animation: fogDrift 18s ease-in-out infinite alternate;
    }
    body::after {
      background:
        radial-gradient(circle at 40% 30%, rgba(255,255,255,0.06), transparent 32%),
        radial-gradient(circle at 80% 70%, rgba(75,123,255,0.08), transparent 24%);
      animation: fogDriftSlow 26s ease-in-out infinite alternate;
    }

    .scene-particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }
    .scene-particles span {
      position: absolute;
      width: var(--size, 10px);
      height: var(--size, 10px);
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(141,232,74,0.4) 45%, rgba(141,232,74,0) 72%);
      box-shadow: 0 0 20px rgba(141,232,74,0.22);
      opacity: 0.5;
      transform: translate3d(0, 0, 0);
      animation: particleFloat var(--duration, 12s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .game-shell {
      position: relative;
      z-index: 1;
      width: min(100%, var(--shell-max));
      height: min(calc(100dvh - (var(--viewport-pad) * 2)), 980px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }
    .playfield-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: stretch;
    }

    .top-bar {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      padding: 12px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(20, 30, 20, 0.72), rgba(78, 150, 44, 0.2));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(24px);
      overflow: hidden;
    }
    .top-bar::before {
      content: "";
      position: absolute;
      inset: -35% -10%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
      transform: translateX(-100%);
      animation: hudSweep 9s linear infinite;
    }
    .stat {
      position: relative;
      min-width: 0;
      padding: 14px 14px 14px 52px;
      border-radius: 22px;
      background: linear-gradient(160deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 12px 30px rgba(12, 32, 10, 0.16);
      transform: translateZ(0);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-align: left;
    }
    .stat:hover {
      transform: translateY(-2px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 18px 36px rgba(12, 32, 10, 0.22);
    }
    .stat::before {
      content: attr(data-icon);
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      font-size: 0.95rem;
    }
    .stat-label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .stat-value {
      margin-top: 5px;
      font-size: clamp(1.08rem, 2vw, 1.55rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      text-shadow: 0 0 18px rgba(255,255,255,0.12);
    }
    .stat.value-pop {
      animation: valuePop 0.45s ease;
    }

    .board-wrap {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: auto minmax(300px, var(--rail-width));
      justify-content: center;
      gap: 14px;
      align-items: stretch;
      padding: 16px;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(141,232,74,0.12), rgba(20,30,20,0.18));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,0.2);
      isolation: isolate;
    }
    .board-stage {
      position: relative;
      z-index: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
    .board-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.18) 48%, transparent 68%);
      mix-blend-mode: screen;
      transform: translateX(-60%) skewX(-16deg);
      animation: boardSweep 10s ease-in-out infinite;
      opacity: 0.65;
    }
    .board-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,255,255,0.13), transparent 28%),
        radial-gradient(circle at 50% 50%, transparent 62%, rgba(0,0,0,0.24) 100%);
    }
    canvas {
      position: relative;
      z-index: 1;
      display: block;
      width: min(var(--stage-max), calc(100vw - var(--stage-side-reserve)), calc(100dvh - 270px));
      height: auto;
      aspect-ratio: 1 / 1;
      min-width: 0;
      min-height: 0;
      border-radius: 28px;
      box-shadow:
        0 24px 40px rgba(7, 18, 7, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }
    .title-chip {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 26px;
      border-radius: 999px;
      background: linear-gradient(160deg, rgba(20,30,20,0.8), rgba(78,150,44,0.4));
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 42px rgba(10,22,10,0.28), inset 0 1px 0 rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 2px 0 rgba(10,22,10,0.35);
      animation: titlePulse 3.2s ease-in-out infinite;
    }
    .title-icon {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
      font-size: 0.95rem;
    }

    .bottom-panel {
      position: relative;
      width: min(100%, 640px);
      justify-self: center;
      display: flex;
      justify-content: center;
      padding: 0;
    }
    .message-card {
      position: relative;
      width: 100%;
      min-height: 114px;
      padding: 0;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(140deg, rgba(8, 24, 16, 0.97) 0%, rgba(15, 48, 27, 0.94) 42%, rgba(37, 100, 46, 0.92) 100%);
      border: 1px solid rgba(255,255,255,0.11);
      box-shadow:
        0 24px 54px rgba(7, 20, 8, 0.28),
        0 0 0 1px rgba(255,255,255,0.04),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -18px 28px rgba(0,0,0,0.12);
      text-align: left;
      backdrop-filter: blur(22px);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      overflow: hidden;
    }
    .message-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        radial-gradient(circle at 18% 0%, rgba(255,255,255,0.12), transparent 32%);
      background-size: 22px 22px, 22px 22px, 100% 100%;
      opacity: 0.14;
      pointer-events: none;
    }
    .message-card::after {
      content: "";
      position: absolute;
      inset: -45% -20%;
      background: linear-gradient(110deg, transparent 36%, rgba(255,255,255,0.16) 48%, transparent 61%);
      transform: translateX(-68%) skewX(-18deg);
      animation: missionSweep 5.8s ease-in-out infinite;
      opacity: 0.7;
      pointer-events: none;
    }
    .message-card[data-sentiment="bullish"] {
      border-color: rgba(132, 255, 150, 0.22);
      box-shadow:
        0 24px 54px rgba(7, 20, 8, 0.28),
        0 0 0 1px rgba(132, 255, 150, 0.06),
        0 0 32px rgba(108,203,60,0.14),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -18px 28px rgba(0,0,0,0.12);
    }
    .message-card[data-sentiment="bearish"] {
      border-color: rgba(255, 112, 133, 0.22);
      box-shadow:
        0 24px 54px rgba(7, 20, 8, 0.28),
        0 0 0 1px rgba(255, 112, 133, 0.05),
        0 0 30px rgba(255,91,110,0.12),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -18px 28px rgba(0,0,0,0.12);
    }
    .message-card.prompt-enter {
      animation: promptEnter 0.45s cubic-bezier(0.2, 0.9, 0.2, 1);
    }
    .message-main {
      position: relative;
      z-index: 1;
      min-height: 114px;
    }
    .mission-line {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 114px;
      padding: 18px 22px;
    }
    .mission-icon-badge {
      position: relative;
      flex: 0 0 70px;
      width: 70px;
      height: 70px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 10px 22px rgba(0,0,0,0.18);
      overflow: hidden;
    }
    .mission-icon-badge::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 14px;
      background: radial-gradient(circle at 50% 40%, rgba(255,255,255,0.16), transparent 72%);
      opacity: 0.9;
    }
    .message-card[data-sentiment="bullish"] .mission-icon-badge {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 0 24px rgba(114, 255, 128, 0.16);
    }
    .message-card[data-sentiment="bearish"] .mission-icon-badge {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 0 24px rgba(255, 102, 123, 0.16);
    }
    .mission-icon-badge svg {
      position: relative;
      z-index: 1;
      width: 40px;
      height: 40px;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
    }
    .mission-copy {
      position: relative;
      z-index: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      padding-right: 88px;
    }
    .mission-title {
      color: #ffffff;
      font-size: clamp(1.28rem, 2.4vw, 1.9rem);
      line-height: 1;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 8px 22px rgba(0,0,0,0.28);
      transform: skewX(-7deg);
      transform-origin: left center;
      white-space: nowrap;
    }
    .mission-subtitle {
      position: relative;
      color: var(--muted);
      font-size: clamp(0.9rem, 1.35vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.01em;
      text-shadow: 0 3px 10px rgba(0,0,0,0.18);
    }
    .mission-watermark {
      position: absolute;
      right: 18px;
      top: 50%;
      width: 148px;
      height: 72px;
      transform: translateY(-50%);
      opacity: 0.09;
      pointer-events: none;
    }
    .message-card[data-sentiment="bullish"] .mission-watermark {
      color: rgba(141, 232, 74, 0.9);
    }
    .message-card[data-sentiment="bearish"] .mission-watermark {
      color: rgba(255, 91, 110, 0.9);
    }
    .message-card[data-sentiment="neutral"] .mission-watermark {
      color: rgba(255, 217, 90, 0.85);
    }
    .message-sub {
      display: none;
    }
    .answer-rail {
      position: relative;
      z-index: 5;
      min-height: 0;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(18, 34, 18, 0.72), rgba(10, 24, 12, 0.84));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 22px 48px rgba(8, 22, 8, 0.22), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(16px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 340px;
    }
    .answer-rail::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: 0.08;
      pointer-events: none;
    }
    .answer-rail-header {
      position: relative;
      z-index: 1;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
    }
    .answer-rail-kicker {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(246,255,231,0.58);
      font-weight: 700;
    }
    .answer-rail-title {
      margin-top: 6px;
      font-size: 1.02rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f6ffe7;
    }
    .answer-list {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      align-content: start;
      overflow: visible;
      transition: gap 0.28s ease, align-content 0.28s ease;
    }
    .answer-list[data-focus="true"] {
      gap: 0;
      align-content: center;
      overflow: hidden;
    }
    .answer-item {
      position: relative;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      grid-template-areas:
        "media body"
        "detail detail";
      align-items: start;
      column-gap: 8px;
      row-gap: 6px;
      border-radius: 18px;
      padding: 8px 8px 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      overflow: hidden;
      max-height: 540px;
      transition:
        border-color 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease,
        opacity 0.24s ease,
        transform 0.3s ease,
        max-height 0.32s ease,
        padding 0.26s ease,
        margin 0.26s ease;
    }
    .answer-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      bottom: 10px;
      width: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .answer-item[data-status="filled"]::before {
      background: linear-gradient(180deg, #8DE84A, #4B7BFF);
      box-shadow: 0 0 12px rgba(141,232,74,0.25);
    }
    .answer-item[data-status="pending"] {
      opacity: 0.68;
    }
    .answer-item[data-open="true"] {
      border-color: rgba(141,232,74,0.24);
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(108,203,60,0.08));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 10px 24px rgba(8,22,8,0.16);
    }
    .answer-list[data-focus="true"] .answer-item[data-rail-group="active"] {
      z-index: 2;
      transform: scale(1.01);
    }
    .answer-list[data-focus="true"] .answer-item[data-rail-group="above"] {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      opacity: 0;
      border-color: transparent;
      box-shadow: none;
      background: transparent;
      transform: translateY(-28px);
      pointer-events: none;
    }
    .answer-list[data-focus="true"] .answer-item[data-rail-group="below"] {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      opacity: 0;
      border-color: transparent;
      box-shadow: none;
      background: transparent;
      transform: translateY(28px);
      pointer-events: none;
    }
    .answer-item-media,
    .answer-item-canvas,
    .answer-item-ghost {
      grid-area: media;
      flex: 0 0 34px;
      width: 34px;
      height: 34px;
      border-radius: 10px;
    }
    .answer-item-canvas,
    .answer-item-ghost {
      display: block;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
      background: rgba(10, 22, 14, 0.28);
    }
    .answer-item-ghost {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .answer-item-ghost::before {
      content: "";
      width: 30px;
      height: 30px;
      border-radius: 10px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 10px 10px;
      opacity: 0.5;
    }
    .answer-item-copy {
      grid-area: body;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .answer-item-summary {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .answer-item-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 8px;
    }
    .answer-item-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .answer-item-summary[data-answer-action="toggle"] {
      cursor: pointer;
    }
    .answer-item-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      align-self: start;
      min-height: 0;
    }
    .answer-item-name {
      font-size: 0.72rem;
      font-weight: 800;
      line-height: 1.08;
      color: #f6ffe7;
    }
    .answer-item-hint {
      font-size: 0.62rem;
      line-height: 1.22;

    function handleCanvasTap(clientX, clientY) {

      const boardLeft = metrics.boardX;
      const boardTop = metrics.boardY;
      const boardRight = boardLeft + metrics.boardSize;
      const boardBottom = boardTop + metrics.boardSize;
      if (tapX < boardLeft || tapX > boardRight || tapY < boardTop || tapY > boardBottom) return;
      const headCenterX = boardLeft + (head.x + 0.5) * metrics.cellSize;
      const headCenterY = boardTop + (head.y + 0.5) * metrics.cellSize;
      const deltaX = tapX - headCenterX;
      const deltaY = tapY - headCenterY;

    function getBoardMetrics() {

    // ============================================
    // 3. INPUT SYSTEM
    // ============================================
    function handleArrowInput(key) {
      const direction = (key === "ArrowUp") ? DIRECTIONS.up :
                        (key === "ArrowDown") ? DIRECTIONS.down :
                        (key === "ArrowLeft") ? DIRECTIONS.left :
                        (key === "ArrowRight") ? DIRECTIONS.right : null;
      if (!direction) return;
      if (state.gameMode === "ready" || state.gameMode === "gameover" || state.gameMode === "won") {
        resetGame();
        state.currentDirection = { ...direction };
        state.nextDirection = { ...direction };
        state.facingDirection = { ...direction };
        startGame();
        return;
      }
      if (state.gameMode !== "running") return;
      if (isReverseDirection(direction, state.currentDirection)) return;

    function isReverseDirection(candidate, current) {
      return candidate.x === -current.x && candidate.y === -current.y;
    }

    // ============================================
    // 4. ROUND GENERATION SYSTEM
    // ============================================
    function shuffle(array) {
      const result = array.slice();
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function getTileCenter(tile) {
      return { x: tile.x + tile.w * 0.5, y: tile.y + tile.h * 0.5 };
    }
    function tileDistanceToHead(tile, head) {
      const center = getTileCenter(tile);
      const headCenterX = head.x + 0.5;
      const headCenterY = head.y + 0.5;
      return Math.hypot(center.x - headCenterX, center.y - headCenterY);
    }
    function tilesOverlap(a, b) {
      return !(a.x + a.w <= b.x || b.x + b.w <= a.x || a.y + a.h <= b.y || b.y + b.h <= a.y);
    }
    function tileOverlapsSnake(tile) {
      return state.snake.some((segment) =>
        segment.x >= tile.x &&
        segment.x < tile.x + tile.w &&
        segment.y >= tile.y &&
        segment.y < tile.y + tile.h
      );
    }
    function buildCandidateTile(x, y) {
      return { x, y, w: 2, h: 2 };
    }
    function getOptionDistanceWindow(head) {
      const headCenterX = head.x + 0.5;
      const headCenterY = head.y + 0.5;
      const furthestSideDistance = Math.max(
        headCenterX,
        CONFIG.cols - headCenterX,
        headCenterY,
        CONFIG.rows - headCenterY
      );
      const minDistance = Math.max(2, Math.floor(furthestSideDistance * CONFIG.optionDistanceMinRatio));
      const maxDistance = Math.min(
        Math.hypot(CONFIG.cols, CONFIG.rows),
        minDistance + CONFIG.optionDistanceMaxExtra
      );
      return { minDistance, maxDistance };
    }
    function isTileCandidateValid(tile, head, otherTile = null, relaxed = false) {
      if (tile.x < 0 || tile.y < 0 || tile.x + tile.w > CONFIG.cols || tile.y + tile.h > CONFIG.rows) {
        return false;
      }
      if (tileOverlapsSnake(tile)) return false;
      const distanceToHead = tileDistanceToHead(tile, head);
      const { minDistance, maxDistance } = getOptionDistanceWindow(head);
      const effectiveMinDistance = relaxed ? Math.max(2, minDistance - 2) : minDistance;
      const effectiveMaxDistance = relaxed ? maxDistance + 2 : maxDistance;
      if (distanceToHead < effectiveMinDistance || distanceToHead > effectiveMaxDistance) {
        return false;
      }
      if (!otherTile) return true;
      if (tilesOverlap(tile, otherTile)) return false;
      const separation = Math.hypot(getTileCenter(tile).x - getTileCenter(otherTile).x, getTileCenter(tile).y - getTileCenter(otherTile).y);
      if (separation < (relaxed ? CONFIG.optionMinSeparation - 2 : CONFIG.optionMinSeparation)) {
        return false;
      }
      if (!relaxed && (tile.x === otherTile.x || tile.y === otherTile.y)) {
        return false;
      }
      return true;
    }
    function findTileCandidates(head, otherTile = null, relaxed = false) {
      const candidates = [];
      for (let y = 0; y <= CONFIG.rows - 2; y++) {
        for (let x = 0; x <= CONFIG.cols - 2; x++) {
          const tile = buildCandidateTile(x, y);
          if (isTileCandidateValid(tile, head, otherTile, relaxed)) candidates.push(tile);
        }
      }
      return candidates;
    }
    function pickRandomTile(head, otherTile = null) {
      let candidates = findTileCandidates(head, otherTile, false);
      if (!candidates.length) candidates = findTileCandidates(head, otherTile, true);
      if (!candidates.length) return buildCandidateTile(Math.max(0, Math.min(CONFIG.cols - 2, head.x + 2)), Math.max(0, Math.min(CONFIG.rows - 2, head.y - 2)));
      return candidates[randomInt(0, candidates.length - 1)];
    }
    function positionRoundFromHead(round, head) {
      const leftTile = pickRandomTile(head);
      const rightTile = pickRandomTile(head, leftTile);
      return {
        ...round,
        left: { ...round.left, ...leftTile },
        right: { ...round.right, ...rightTile }
      };
    }
    function generateRounds() {
      const bullish = shuffle(PATTERNS.bullish);
      const bearish = shuffle(PATTERNS.bearish);
      return Array.from({ length: CONFIG.totalRounds }, (_, index) => {
        // Place rows with enough gap
        const y = (CONFIG.firstRowY - (index * CONFIG.rowGap) + 100 * CONFIG.rows) % CONFIG.rows;
        const bullLeft = Math.random() < 0.5;
        const question = ROUND_QUESTIONS[randomInt(0, ROUND_QUESTIONS.length - 1)];
        const bull = { name: bullish[index], sentiment: "bullish", x: 0, y, w: 2, h: 2 };
        const bear = { name: bearish[index], sentiment: "bearish", x: 0, y, w: 2, h: 2 };

        const right = bullLeft ? bear : bull;

    // ============================================

    function buildStartingSnake() {

      let nextX = head.x + state.currentDirection.x;
      let nextY = head.y + state.currentDirection.y;
      
      if (nextX < 0) nextX = CONFIG.cols - 1;
      else if (nextX >= CONFIG.cols) nextX = 0;
      if (nextY < 0) nextY = CONFIG.rows - 1;
      else if (nextY >= CONFIG.rows) nextY = 0;

      const newHead = { x: nextX, y: nextY };
      state.facingDirection = { ...state.currentDirection };
      state.previousSnake = cloneSnake(state.snake);
      state.snake.unshift(newHead);

    function drawPatternTile(context, option, size, metrics, pulse) {
      const panelW = option.w * size;
      const panelH = option.h * size;
      const x = metrics.boardX + option.x * size;
      const y = metrics.boardY + option.y * size;
      const isBullish = false;
      const glow = "rgba(255, 255, 255, 0.2)";
      const border = "rgba(255, 255, 255, 0.18)";
      const contentPad = size * 0.16;
      const labelBand = size * 0.5;
      const spawnAlpha = state.activeRoundSpawnAt ? Math.min(1, (performance.now() - state.activeRoundSpawnAt) / 320) : 1;
      const spawnEase = 1 - Math.pow(1 - spawnAlpha, 3);
      const cardScale = 0.88 + spawnEase * 0.12 + Math.sin(pulse * 2.8 + option.x) * 0.01;
      const arrow = isBullish ? "▲" : "▼";
      context.save();
      context.translate(x + panelW * 0.5, y + panelH * 0.5);
      context.scale(cardScale, cardScale);
      context.translate(-(x + panelW * 0.5), -(y + panelH * 0.5));
      context.save();
      context.shadowColor = glow;
      context.shadowBlur = 24 + Math.sin(pulse * 5 + option.y) * 4;
      context.shadowOffsetY = 8;
      const glass = context.createLinearGradient(x, y, x + panelW, y + panelH);
      glass.addColorStop(0, "rgba(18, 29, 36, 0.96)");
      glass.addColorStop(0.58, "rgba(24, 38, 46, 0.88)");
      glass.addColorStop(1, "rgba(14, 22, 30, 0.98)");
      context.fillStyle = glass;
      context.beginPath();
      context.roundRect(x, y, panelW, panelH, size * 0.18);
      context.fill();
      context.strokeStyle = border;
      context.lineWidth = Math.max(1.5, size * 0.06);
      context.stroke();
      context.restore();
      context.save();
      const topSheen = context.createLinearGradient(x, y, x, y + panelH);
      topSheen.addColorStop(0, "rgba(255,255,255,0.18)");
      topSheen.addColorStop(0.4, "rgba(255,255,255,0.02)");
      topSheen.addColorStop(1, "rgba(255,255,255,0)");
      context.fillStyle = topSheen;
      context.beginPath();
      context.roundRect(x + 1, y + 1, panelW - 2, panelH * 0.56, size * 0.16);
      context.fill();
      context.restore();
      drawCandles(context, option.name, x + contentPad, y + contentPad, panelW - contentPad * 2, panelH - labelBand - contentPad);
      context.save();
      context.textAlign = "center";
      context.textBaseline = "middle";
      context.fillStyle = "#f6ffe7";
      context.font = `700 ${Math.max(7, size * 0.21)}px ${getComputedStyle(document.documentElement).getPropertyValue("--font")}`;
      context.fillText(option.name, x + panelW * 0.5, y + panelH - labelBand * 0.45);
      context.restore();
      if (CONFIG.debugHitbox) {
        context.save();
        context.fillStyle = "rgba(255, 0, 0, 0.18)";
        context.strokeStyle = "rgba(255, 0, 0, 0.55)";
        context.lineWidth = 1;
        context.fillRect(x, y, panelW, panelH);
        context.strokeRect(x, y, panelW, panelH);
        context.restore();

      context.restore();
    }
    function drawBoard(metrics) {
      const { boardX, boardY, boardSize, cellSize } = metrics;
      const baseGradient = ctx.createLinearGradient(boardX, boardY, boardX, boardY + boardSize);
      baseGradient.addColorStop(0, "#8DE84A");
      baseGradient.addColorStop(0.45, "#6CCB3C");
      baseGradient.addColorStop(1, "#4E962C");
      ctx.fillStyle = baseGradient;
      ctx.fillRect(boardX, boardY, boardSize, boardSize);
      for (let y = 0; y < CONFIG.rows; y++) {
        for (let x = 0; x < CONFIG.cols; x++) {
          const px = boardX + x * cellSize;
          const py = boardY + y * cellSize;
          const tone = (x + y) % 2 === 0;
          const cellGradient = ctx.createLinearGradient(px, py, px + cellSize, py + cellSize);
          cellGradient.addColorStop(0, tone ? "#AEEA5D" : "#99D546");
          cellGradient.addColorStop(1, tone ? "#87D541" : "#79C639");
          ctx.fillStyle = cellGradient;
          ctx.fillRect(px, py, cellSize + 1, cellSize + 1);
        }
      }
      const glow = ctx.createRadialGradient(boardX + boardSize * 0.5, boardY + boardSize * 0.12, boardSize * 0.04, boardX + boardSize * 0.5, boardY + boardSize * 0.12, boardSize * 0.7);
      glow.addColorStop(0, "rgba(255,255,255,0.18)");
      glow.addColorStop(0.35, "rgba(255,255,255,0.06)");
      glow.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = glow;
      ctx.fillRect(boardX, boardY, boardSize, boardSize);
      if (state.streak > 1) {
        const streakGlow = Math.min(0.18, state.streak * 0.03) * (0.65 + Math.sin(state.pulse * 5) * 0.35);
        ctx.fillStyle = `rgba(255, 217, 90, ${streakGlow})`;
        ctx.fillRect(boardX, boardY, boardSize, boardSize);
      }
    }
    function drawActiveRound(metrics) {
      if (!state.activeRound) return;
      const pulse = 1 + Math.sin(state.pulse * 6) * 0.08;
      drawPatternTile(ctx, state.activeRound.left, metrics.cellSize, metrics, pulse);
      drawPatternTile(ctx, state.activeRound.right, metrics.cellSize, metrics, pulse);
    }
    function wrapInterpolatedValue(value, size) {
      let result = value;
      while (result < 0) result += size;
      while (result >= size) result -= size;
      return result;
    }
    function interpolateWrapped(from, to, size, alpha) {
      let delta = to - from;
      if (Math.abs(delta) > size * 0.5) delta += delta > 0 ? -size : size;
      return wrapInterpolatedValue(from + delta * alpha, size);
    }
    function getRenderDirection() {
      return isReverseDirection(state.nextDirection, state.currentDirection) ? state.currentDirection : state.nextDirection;
    }
    function getRenderedSegment(index, alpha) {
      const segment = state.snake[index];
      if (!segment) return state.snake[state.snake.length - 1];
      if (index === 0) {
        const renderDirection = getRenderDirection();
        const target = {
          x: segment.x + renderDirection.x,
          y: segment.y + renderDirection.y
        };
        return {
          x: interpolateWrapped(segment.x, target.x, CONFIG.cols, alpha),
          y: interpolateWrapped(segment.y, target.y, CONFIG.rows, alpha)
        };
      }
      const target = state.snake[index - 1] || segment;
      return {
        x: interpolateWrapped(segment.x, target.x, CONFIG.cols, alpha),
        y: interpolateWrapped(segment.y, target.y, CONFIG.rows, alpha)
      };
    }
    function getInterpolatedSegment(index, alpha) {
      const current = state.snake[index] || state.snake[state.snake.length - 1];
      const previous = state.previousSnake[index] || current;
      // Handle wrapping interpolation
      let dx = current.x - previous.x;
      let dy = current.y - previous.y;
      if (Math.abs(dx) > 1) dx = dx > 0 ? -1 : 1;
      if (Math.abs(dy) > 1) dy = dy > 0 ? -1 : 1;
      return { x: previous.x + dx * alpha, y: previous.y + dy * alpha };
    }
    function renderSnake(metrics) {
      const alpha = state.gameMode === "running" ? Math.min(1, state.accumulator / CONFIG.tickMs) : 0;
      const size = metrics.cellSize;
      const blinkPhase = state.pulse % 4.2;
      const blinkScale = blinkPhase > 3.75 && blinkPhase < 3.95 ? 0.22 : 1;
      const tongueOut = state.pulse % 5.4 < 0.18;
      for (let i = state.snake.length - 1; i >= 0; i--) {
        const s = getRenderedSegment(i, alpha);
        const bounce = Math.sin(state.pulse * 8 + i * 0.45) * size * 0.028;
        const segmentSize = size * (i === 0 ? 0.9 : 0.76);
        const px = metrics.boardX + s.x * size + (size - segmentSize) * 0.5;
        const py = metrics.boardY + s.y * size + (size - segmentSize) * 0.5 + bounce;
        const radius = segmentSize * 0.46;
        ctx.save();
        ctx.fillStyle = "rgba(14, 28, 84, 0.18)";
        ctx.beginPath();
        ctx.ellipse(px + segmentSize * 0.5, py + segmentSize * 0.92, segmentSize * 0.42, segmentSize * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        ctx.save();
        ctx.shadowColor = "rgba(43, 78, 196, 0.34)";
        ctx.shadowBlur = i === 0 ? 16 : 12;
        ctx.shadowOffsetY = 6;
        const bodyGradient = ctx.createLinearGradient(px, py, px, py + segmentSize);
        bodyGradient.addColorStop(0, i === 0 ? "#88ABFF" : "#6D95FF");
        bodyGradient.addColorStop(0.55, i === 0 ? "#4B7BFF" : "#4F7CFA");
        bodyGradient.addColorStop(1, i === 0 ? "#2E5EFF" : "#365FE1");
        ctx.fillStyle = bodyGradient;
        ctx.beginPath();
        ctx.roundRect(px, py, segmentSize, segmentSize, radius);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();
        ctx.save();
        const sheen = ctx.createLinearGradient(px, py, px, py + segmentSize * 0.7);
        sheen.addColorStop(0, "rgba(255,255,255,0.28)");
        sheen.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = sheen;
        ctx.beginPath();
        ctx.roundRect(px + segmentSize * 0.08, py + segmentSize * 0.08, segmentSize * 0.84, segmentSize * 0.36, radius * 0.7);
        ctx.fill();
        ctx.restore();
      }
      const head = getRenderedSegment(0, alpha);
      const cx = metrics.boardX + (head.x + 0.5) * size; const cy = metrics.boardY + (head.y + 0.5) * size;
      let angle = -Math.PI * 0.5;
      if (state.facingDirection.x === -1) angle = Math.PI;
      if (state.facingDirection.x === 1) angle = 0;
      if (state.facingDirection.y === 1) angle = Math.PI * 0.5;

      ctx.rotate(angle);

        ctx.strokeStyle = "#FF7D8B";
        ctx.lineWidth = Math.max(1.2, size * 0.05);
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(size * 0.43, 0);
        ctx.lineTo(size * 0.58, -size * 0.05);
        ctx.moveTo(size * 0.43, 0);
        ctx.lineTo(size * 0.58, size * 0.05);
        ctx.stroke();
      }
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.ellipse(size * 0.13, -size * 0.14, size * 0.11, size * 0.12 * blinkScale, 0, 0, Math.PI * 2);
      ctx.ellipse(size * 0.13, size * 0.14, size * 0.11, size * 0.12 * blinkScale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#1F2F59";
      ctx.beginPath();
      ctx.arc(size * 0.16, -size * 0.14, size * 0.045, 0, Math.PI * 2);
      ctx.arc(size * 0.16, size * 0.14, size * 0.045, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

      if (!state.flash) return;

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.08)";

    function initGame() { syncDeviceMode(); hideNonBoardUi(); createAmbientParticles(); setupCanvas(); resetGame(); updateHud(); render(); }
    function step(timestamp) {
      if (!state.lastTimestamp) state.lastTimestamp = timestamp;
      const deltaMs = Math.min(32, timestamp - state.lastTimestamp);
      state.lastTimestamp = timestamp; state.pulse += deltaMs / 1000;
      if (state.flash) { state.flash.alpha *= Math.pow(0.12, deltaMs / 1000); if (state.flash.alpha < 0.01) state.flash = null; }
      updateGameFlow(performance.now());
      if (state.gameMode === "running") {
        if (state.startAt && performance.now() < state.startAt) { render(); requestAnimationFrame(step); return; }
        if (state.startAt && performance.now() >= state.startAt) state.startAt = 0;
        state.accumulator += deltaMs;
        while (state.accumulator >= CONFIG.tickMs) {
          tickGame();
          state.accumulator -= CONFIG.tickMs;
          if (state.gameMode !== "running") { state.accumulator = 0; break; }
        }
      }
      render(); requestAnimationFrame(step);
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown"].includes(event.key)) {
        event.preventDefault(); if (!event.repeat) handleArrowInput(event.key);
      }
      if (event.code === "Space") {
        event.preventDefault();
        if (state.gameMode === "running") { state.gameMode = "paused"; setMessage("Paused", "Press Space to resume."); }
        else if (state.gameMode === "paused") { state.gameMode = "running"; setPromptText(state.activeRound ? state.activeRound.questionText : "Mission Active", state.activeRound ? state.activeRound.targetSentiment : null); }
      }
    });

      handleCanvasTap(event.clientX, event.clientY);
    });
    restartButton.addEventListener("click", () => { ensureAudio(); resetGame(); });
    soundButton.addEventListener("click", () => { ensureAudio(); });
    window.addEventListener("resize", () => { syncDeviceMode(); setupCanvas(); render(); renderAnswerPatternPreviews(); });
